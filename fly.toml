# Fly.io config. Deploy: `fly launch --copy-config --now` then set secrets:
#   fly secrets set CANVAS_BASE_URL=https://canvas.youruni.edu CANVAS_API_TOKEN=xxxx
# Your MCP URL becomes https://<app-name>.fly.dev/mcp
app = "canvas-poke-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
